name: PR Validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: Celeste.Inventory.slnx

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.slnx', '**/*.csproj', '**/*.props', '**/*.targets', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_FILE"

      - name: Verify formatting
        run: dotnet format "$SOLUTION_FILE" --verify-no-changes --no-restore --verbosity minimal

      - name: Build
        run: dotnet build "$SOLUTION_FILE" --configuration Release --no-restore

      - name: Test
        run: dotnet test "$SOLUTION_FILE" --configuration Release --no-build --verbosity normal
